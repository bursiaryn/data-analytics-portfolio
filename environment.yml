name: porto-data-analyst
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pandas
  - numpy
  - matplotlib
  - seaborn
  - scikit-learn
  - scipy
  - statsmodels
  - jupyter
  - nbconvert
  - pyarrow
  - plotly
  - pip
  - pip:
      - openai                # OpenRouter API — P3 narrative generation (free tier, OpenAI-compatible)
      - mlflow                # Model experiment tracking & monitoring dashboard
      - python-dotenv        # Load API keys dari .env (jangan hardcode)
      - streamlit            # Interactive deployment — sales-dashboard
      - shap                 # Model explainability — churn + supply-chain
